spring.application.name=sales_management_system
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sales_management_db}
spring.datasource.username=${DB_USER_NAME:postgres}
spring.datasource.password=${DB_USER_PASSWORD:43642127}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8080}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE